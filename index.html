
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets(ATP).mind; filterMinCF: 0.001; filterBeta: 0.01" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="card" src="ATP.png"/>
        <a-asset-item id="avatarModel" src="GPH.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
      <a-plane color="#bb9674" width="1" height="1.5" position="0 0 0" rotation="0 0 0" opacity="0.7"></a-plane>
      <a-gltf-model rotation="30 0 0 " position="0 -0.5 1" scale="1.2 1.2 1.2" src="#avatarModel" animation="property: rotation; to: 30 360 0; loop: true; dur: 8000; easing: linear;">
      </a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
